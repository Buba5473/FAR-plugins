; ==============================================================================
; Конфигурационный файл для Far Hardware Viewer (AMD64 Multi-Engine Plugin)
; Разместить в корневой папке плагина рядом с бинарным файлом (.dll/.so)
; ==============================================================================

[CacheManager]
; Радиус кольцевого упреждающего кэширования страниц в RAM.
; 1 = удерживать в памяти текущую, прошлую и следующую страницы (N-1, N, N+1)
; 2 = удерживать больший диапазон страниц (N-2, N-1, N, N+1, N+2) - требует больше RAM
PrefetchRadius = 1

; Максимальное время (в миллисекундах) ожидания ответа от асинхронного потока пула std::async
; до того, как плагин временно сдастся и выведет на экран сообщение "Загрузка..."
AsyncTimeoutMs = 150

; Автоматически очищать кэш страниц при изменении масштаба (Зума) пользователем
; 1 - Да (экономит память, но при возврате масштаба страница будет передекодироваться)
; 0 - Нет (кэширует страницы под текущий масштаб, плавнее перелистывание при зуме)
DropCacheOnZoom = 0


[CAD_Rendering_Engine]
; Переключение глобальной цветовой схемы для векторных чертежей DXF/DWG
; dark  = чертежный фон (0.05, 0.05, 0.05), контрастные яркие линии (LimeGreen/White)
; light = классический бумажный фон (1.0, 1.0, 1.0), черные и цветные линии
ColorScheme = dark

; Цветовые параметры фона чертежа в формате RGBA (значения от 0.0 до 1.0)
; Игнорируется, если параметр ColorScheme жестко выставлен в "light" (там принудительно белый)
BgColorR = 0.05
BgColorG = 0.05
BgColorB = 0.05
BgColorA = 1.00

; Цвет линий чертежа по умолчанию (если слой в DXF не задает свой собственный цвет)
LineColorR = 0.19
LineColorG = 0.80
LineColorB = 0.19
LineColorA = 1.00

; Минимальная аппаратная толщина StrokeWidth для линий (в экранных пикселях)
; Предотвращает исчезновение мелких линий схем при сильном отдалении чертежа (зуме назад)
MinStrokeWidth = 0.5


[Controls]
; Чувствительность зума (множитель изменения масштаба за один шаг)
; 1.10 означает изменение на 10% за одно нажатие клавиш + / -
KeyboardZoomStep = 1.10

; Множитель изменения масштаба при одном щелчке (клике) колесика мыши
MouseWheelZoomStep = 1.05

; Скорость скролла (количество пикселей смещения холста за одно нажатие стрелок)
; Формула в коде делит этот шаг на текущий коэффициент зума для нативного панорамирования
KeyboardScrollSpeed = 25.0


[Interface]
; Флаг отображения плашки строки статуса в правом верхнем углу экрана
; 1 - Показывать метаданные (Разрешение, Масштаб %, Страница, Движок)
; 0 - Скрыть строку статуса, чистый экран
ShowStatusBar = 1

; Прозрачность черной подложки статус-бара (из Notcurses)
; Значения от 0.0 (полностью прозрачный) до 1.0 (глубокий черный фон)
StatusBarAlpha = 0.70
